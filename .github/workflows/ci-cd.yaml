name: CI/CD — Food Delivery App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ── Job 1: Run tests ──────────────────────────────────
  test:
    name: Test services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, order-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package.json

      - name: Install dependencies
        run: npm install
        working-directory: services/${{ matrix.service }}

      - name: Run tests
        run: npm test --if-present
        working-directory: services/${{ matrix.service }}

  # ── Job 2: Build and push Docker images ──────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [user-service, order-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  # ── Job 3: Deploy to Kubernetes via ArgoCD sync ──────
  deploy:
    name: Trigger ArgoCD sync
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Sync ArgoCD app
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure
          argocd app sync food-delivery-dev
          argocd app wait food-delivery-dev --health
