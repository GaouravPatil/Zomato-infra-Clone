apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: food-delivery-dev
  labels:
    app: notification-service
    tier: backend
spec:
  replicas: 1                        # Kafka consumer — usually 1 per partition group
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: yourdockerhubuser/notification-service:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: PORT
              value: "3005"
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: TWILIO_AUTH_TOKEN
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 20   # Extra time — Kafka connect takes longer
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"
