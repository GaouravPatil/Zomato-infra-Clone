apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: food-delivery-dev
data:
  # Kafka broker address — used by order, payment, notification services
  KAFKA_BROKER: "kafka-service:9092"

  # Database hosts — each service gets its own DB (database-per-service pattern)
  USER_DB_HOST: "postgres-user-service"
  ORDER_DB_HOST: "postgres-order-service"
  PAYMENT_DB_HOST: "postgres-payment-service"

  # MongoDB for restaurant-service (flexible menu schema)
  MONGO_HOST: "mongodb-service"
  MONGO_PORT: "27017"
  MONGO_DB: "restaurantdb"

  # Redis for delivery-service (rider location tracking)
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # Internal service URLs (ClusterIP — only reachable inside the cluster)
  USER_SERVICE_URL: "http://user-service:3001"
  ORDER_SERVICE_URL: "http://order-service:3002"
  RESTAURANT_SERVICE_URL: "http://restaurant-service:3003"
  DELIVERY_SERVICE_URL: "http://delivery-service:3004"
  PAYMENT_SERVICE_URL: "http://payment-service:3005"

  # App settings
  NODE_ENV: "development"
  LOG_LEVEL: "info"
