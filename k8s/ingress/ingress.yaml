# Run this first to enable Ingress on Minikube:
# minikube addons enable ingress
#
# After applying, add to /etc/hosts:
# 127.0.0.1  food-delivery.local
# Then run: minikube tunnel

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-delivery-ingress
  namespace: food-delivery-dev
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Rate limiting — max 100 requests per minute per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  rules:
    - host: food-delivery.local
      http:
        paths:
          # Route /api/users/* → user-service
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3001

          # Route /api/orders/* → order-service
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 3002

          # Route /api/restaurants/* → restaurant-service
          - path: /api/restaurants
            pathType: Prefix
            backend:
              service:
                name: restaurant-service
                port:
                  number: 3003

          # Route /api/delivery/* → delivery-service
          - path: /api/delivery
            pathType: Prefix
            backend:
              service:
                name: delivery-service
                port:
                  number: 3004

          # Route /api/payments/* → payment-service
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 3005
